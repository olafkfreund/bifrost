{{- if and .Values.api.persistence.enabled (ne (include "bifrost.usesPostgres" .) "true") }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "bifrost.fullname" . }}-data
  labels:
    {{- include "bifrost.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.api.persistence.size }}
  {{- with .Values.api.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
