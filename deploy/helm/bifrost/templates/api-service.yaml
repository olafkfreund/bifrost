apiVersion: v1
kind: Service
metadata:
  name: {{ include "bifrost.fullname" . }}-api
  labels:
    {{- include "bifrost.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
