# Serve the SPA and proxy the API. The portal calls a relative /api, so /api/*
# is forwarded to the control plane; everything else falls back to index.html.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API + SSE. `BIFROST_API_HOST` is baked at image build to the api service
    # name; override via a templated conf if your service differs.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Server-Sent Events (job progress stream): no buffering, keep it open.
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
