<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bifrost — Azure DevOps → GitHub Actions migration portal" />
    <title>Bifrost · Migration Portal</title>
    <script>
      // Set the Gruvbox theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('bifrost-theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
          }
          document.documentElement.dataset.theme = t
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
